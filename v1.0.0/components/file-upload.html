<div class="form-group">
    <label>上传SVP文件：</label>
    <div class="file-upload-wrapper">
        <!-- 上传区域（点击+拖放） -->
        <div class="file-upload-area" id="fileUploadArea">
            <p class="file-upload-text" id="uploadHintText">点击选择或拖放SVP文件到此处</p>
            <p class="file-upload-filename" id="uploadFileName"></p>
        </div>
        <input type="file" id="svpFile" accept=".svp">
    </div>
    <div class="error提示" id="fileError">请上传后缀为.svp的文件！</div>
</div>
